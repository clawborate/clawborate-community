name: clawborate-community

# docker-compose.yml
#
# Community edition stack for Clawborate.
#
# Services: backend (community image), postgres, nginx, open_webui
#
# Usage:
#   cp .env.example .env
#   # Fill in required secrets in .env
#   docker compose up -d
#
# Required environment variables (must be set in .env or shell):
#   APP_DB_PASSWORD       — PostgreSQL password for the clawborate app user
#
# Optional environment variables (sensible defaults provided):
#   CLAWBORATE_DOCKER_NETWORK   — Docker network name used by worker containers (default: clawborate-community-net)
#   CLAWBORATE_DOCKER_HOST      — Docker daemon socket or TCP host URL passed to the backend as an
#                                 env var only (e.g. unix:///var/run/docker.sock or tcp://1.2.3.4:2375).
#                                 NOTE: the actual socket bind-mount is always /var/run/docker.sock.
#                                 If you use a TCP Docker host, remove the socket volume from the
#                                 backend service and ensure the backend can reach the TCP endpoint.
#   OPENWEBUI_DB_PASSWORD       — PostgreSQL password for the open-webui user (default: openwebui)
#   OPENCLAW_GATEWAY_TOKEN      — Shared secret between backend and OpenClaw agents (default: clawborate-secret)
#   FRONTEND_PORT               — Host port exposed by nginx (default: 3000)
#   VERSION                     — Image tag to pull (default: latest)
#
# Database initialisation:
#   The postgres service runs init scripts from ./docker/postgres-init/ on first start.
#   This directory MUST contain a script that creates the clawborate user and database,
#   The canonical script is docker/postgres-init/01_create_clawborate_db.sh
#   Without this script the backend DATABASE_URL connection will fail silently at startup.
#   See docker/postgres-init/01_create_clawborate_db.sh in the repository.

services:

  # ── Agent image pre-pull — ensures the OpenClaw image is cached before
  #    the first team is created, so container startup isn't blocked by a
  #    multi-GB download. Exits immediately once the pull completes.
  agent-image-pull:
    image: docker:27-cli
    entrypoint: ["docker", "pull", "${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.15}"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: []
    restart: "no"

  # ── Frontend — open-source Next.js app (built from source) ─────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_VERSION=${VERSION:-community}
        - BACKEND_URL=http://backend:8001
    environment:
      - BACKEND_URL=http://backend:8001
    depends_on:
      - backend
    networks:
      - clawborate-community-net
    restart: unless-stopped

  # ── Nginx — single entry point ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ow-inject.js:/etc/nginx/html/ow-inject.js:ro
    depends_on:
      - backend
      - open-webui
    networks:
      - clawborate-community-net
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

  # ── Backend — community image (pre-compiled, shell-hardened) ────────────────
  backend:
    image: clawborate/clawborate-community:${VERSION:-latest}
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - backend_data:/data
      # Docker socket for worker container management (community: max_workers=1).
      # This mount is always the local Unix socket path.
      # If CLAWBORATE_DOCKER_HOST is set to a TCP URL, remove this volume entry
      # and ensure network reachability to the remote Docker daemon instead.
      - /var/run/docker.sock:/var/run/docker.sock
      # Agent architecture definitions — mount read-only so users can customise
      # experts, teams, and agent templates without rebuilding the image.
      # Remove this line to use the bundled defaults baked into the image.
      - ./agent-arch:/app/agent-arch:ro
    group_add:
      - "0"   # GID 0 (root group) to access the Docker socket
    environment:
      # Storage
      # DATA_DIR: path inside the container where persistent data is stored.
      # HOST_DATA_DIR: the path to the same data directory as seen by the Docker
      #   daemon on the HOST (used when the backend spawns worker containers that
      #   need to bind-mount this directory). In a standard Linux deployment this
      #   is the host path backing the named volume; set it to the actual host
      #   path if you replace backend_data with a bind mount.
      - AGENT_ARCH_DIR=/app/agent-arch
      - DATA_DIR=/data
      - HOST_DATA_DIR=${HOST_DATA_DIR:-/var/lib/docker/volumes/clawborate-community_backend_data/_data}
      # Database
      - DATABASE_URL=postgresql://clawborate:${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set in .env}@postgres:5432/clawborate
      # Docker connectivity (community limits)
      - CLAWBORATE_DOCKER_NETWORK=${CLAWBORATE_DOCKER_NETWORK:-clawborate-community-net}
      - CLAWBORATE_DOCKER_HOST=${CLAWBORATE_DOCKER_HOST:-unix:///var/run/docker.sock}
      - AGENT_NETWORK=${CLAWBORATE_DOCKER_NETWORK:-clawborate-community-net}
      # Agent image
      - OPENCLAW_IMAGE=${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.4.15}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-clawborate-secret}
      # LLM provider
      - LLM_PROVIDER=${LLM_PROVIDER:-custom}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_CONTEXT_WINDOW=${LLM_CONTEXT_WINDOW:-}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-}
      - LLM_IDLE_TIMEOUT_SECONDS=${LLM_IDLE_TIMEOUT_SECONDS:-}
      - LLM_THINKING_MODE=${LLM_THINKING_MODE:-}
      - LLM_SKIP_BOOTSTRAP=${LLM_SKIP_BOOTSTRAP:-}
      - MAX_CONTEXT_MESSAGES=${MAX_CONTEXT_MESSAGES:-}
      # Server
      - HOST=0.0.0.0
      - PORT=8001
      - VERSION=${VERSION:-community}
      - JWT_SECRET=${JWT_SECRET:-}
      # Open WebUI integration
      - OPENWEBUI_URL=${OPENWEBUI_URL:-http://open-webui:8080}
      - OPENWEBUI_API_KEY=${OPENWEBUI_API_KEY:-}
      - OPENWEBUI_ADMIN_EMAIL=${OPENWEBUI_ADMIN_EMAIL:-admin@clawborate.local}
      - OPENWEBUI_ADMIN_PASSWORD=${OPENWEBUI_ADMIN_PASSWORD:-}
      # Default user (seeded on first run if no users exist)
      - DEFAULT_USER_EMAIL=${DEFAULT_USER_EMAIL:-test@test.com}
      - DEFAULT_USER_PASSWORD=${DEFAULT_USER_PASSWORD:-test}
      - DEFAULT_USER_NAME=${DEFAULT_USER_NAME:-Admin}
      # Community edition flag (injected at build time; env fallback for local dev)
      - CLAWBORATE_EDITION=${CLAWBORATE_EDITION:-community}
    tmpfs:
      - /tmp/app
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./docker/seccomp-community.json
    depends_on:
      postgres:
        condition: service_healthy
      agent-image-pull:
        condition: service_completed_successfully
    networks:
      - clawborate-community-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openwebui
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: ${OPENWEBUI_DB_PASSWORD:-openwebui}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data  # tmpfs — wiped on container stop
      # Init scripts run once on first container start (empty data volume).
      # REQUIRED: docker/postgres-init/ must contain a script that creates the
      # clawborate user and database. Without it the backend will fail to connect.
      # See docker/postgres-init/01_create_clawborate_db.sh in the repository.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwebui"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clawborate-community-net
    restart: unless-stopped

  # ── Open WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main-slim
    environment:
      - DATABASE_URL=postgresql://openwebui:${OPENWEBUI_DB_PASSWORD:-openwebui}@postgres:5432/openwebui
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://backend:8001/v1}
      - OPENAI_API_KEY=${OPENCLAW_GATEWAY_TOKEN:-clawborate-secret}
      - WEBUI_FRAME_ANCESTORS=${WEBUI_FRAME_ANCESTORS:-*}
      - WEBUI_AUTH=true
      - WEBUI_ANONYMOUS_CHAT=false
      - ENABLE_SIGNUP=true
      # RAG toggle: controls whether OW downloads embedding models from
      # HuggingFace on startup (~500MB download, 1-2GB RAM at runtime).
      # Default: RAG disabled — chat works fine without it.
      # To enable: set RAG_EMBEDDING_ENGINE= and RAG_EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-openai}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - clawborate-community-net
    restart: unless-stopped

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  clawborate-community-net:
    name: ${CLAWBORATE_DOCKER_NETWORK:-clawborate-community-net}
    driver: bridge
    # internal: true is intentionally omitted — outbound access is needed
    # for pulling agent images. Restrict at the host firewall if required.

# ── Volumes ──────────────────────────────────────────────────────────────────
# Named volumes — data persists across container restarts and rebuilds.
# To start fresh: docker compose down -v
volumes:
  postgres_data: {}
  backend_data: {}
  # open-webui-hf-cache: {}  # Uncomment if RAG is enabled
