map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Detect requests that originated from within the OW iframe.
# OW's SvelteKit sometimes uses location.href instead of history.pushState,
# which bypasses our JS interceptor. When the Referer shows an OW-context
# URL (/ow/ prefix or bare /c/{uuid}), redirect back to /ow/.
map $http_referer $ow_nav {
    ~/ow/          1;
    ~/c/[0-9a-f]   1;
    default        0;
}

upstream nextjs  { server frontend:3000; }
upstream owui    { server open-webui:8080; }
upstream backend { server backend:8001; }

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # ── Clawborate WebSocket — route directly to backend (bypasses Next.js) ─
    # Next.js cannot proxy WebSocket upgrades, so /api/ws/* must go straight
    # to the backend before the generic /api/ location catches it.
    location /api/ws/ {
        proxy_pass http://backend/api/ws/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Open WebUI API calls — bypass sub_filter buffering ───────────────
    # sub_filter buffers responses to scan for patterns, which breaks SSE.
    # Route /ow/api/* directly to OW without sub_filter so streaming works.
    location /ow/api/ {
        proxy_pass http://owui/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Open WebUI under /ow/ ────────────────────────────────────────────
    # Strips /ow prefix; OW thinks it runs at /.
    location /ow/ {
        proxy_pass http://owui/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable upstream compression so sub_filter can rewrite HTML
        proxy_set_header Accept-Encoding "";

        # WebSocket (Socket.IO for OW real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering so SSE streaming responses pass through immediately
        proxy_buffering off;
        proxy_cache off;

        # ── HTML rewriting ──────────────────────────────────────────────
        sub_filter_types text/html;
        sub_filter_once  off;

        # Rewrite HTML attributes with root-relative paths
        sub_filter 'href="/'   'href="/ow/';
        sub_filter "href='/"   "href='/ow/";
        sub_filter 'src="/'    'src="/ow/';
        sub_filter "src='/"    "src='/ow/";
        sub_filter 'action="/' 'action="/ow/';

        # Rewrite inline JS assignments (e.g. img.src = '/user.png')
        sub_filter ".src = '/"    ".src = '/ow/";
        sub_filter '.src = "/'    '.src = "/ow/';
        sub_filter ".src='/"      ".src='/ow/";
        sub_filter '.src="/'      '.src="/ow/';

        # SvelteKit base path (inline config block)
        sub_filter 'base: ""' 'base: "/ow"';

        # SvelteKit dynamic imports in inline script
        sub_filter 'import("/_app/' 'import("/ow/_app/';

        # Inject OW patch script before </head>.
        # The script handles: token seeding, history.pushState patch, fetch
        # interceptor (path rewriting, model filtering, chat history repair).
        # sub_filter_once is off globally, but </head> appears only once per page.
        sub_filter '</head>' '<script src="/ow-inject.js"></script></head>';
    }

    # Bare /ow (no trailing slash) — redirect to /ow/
    location = /ow {
        return 302 /ow/;
    }

    # OW injection script — served from local filesystem, no upstream needed.
    location = /ow-inject.js {
        root /etc/nginx/html;
        add_header Cache-Control "no-cache, no-store";
        add_header Content-Type "application/javascript";
    }

    # ── OW WebSocket (Socket.IO) ──────────────────────────────────────
    # OW's compiled JS connects to /ws/socket.io/ (not /ow/ws/...),
    # and the fetch interceptor can't intercept WebSocket constructors.
    location /ws/ {
        proxy_pass http://owui/ws/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # OW assets referenced from compiled JS bundles (can't be rewritten by sub_filter)
    location = /user.png {
        proxy_pass http://owui/user.png;
    }
    location /static/ {
        proxy_pass http://owui/static/;
    }

    # ── OW page routes that leak out of the /ow/ prefix ──────────────────
    # SvelteKit client-side navigation sometimes bypasses the base path
    # rewrite, producing requests to /c/{id} instead of /ow/c/{id}.
    # Redirect these back to the /ow/ prefixed path.
    location /c/ {
        rewrite ^/c/(.*)$ /ow/c/$1 redirect;
    }
    location /_app/ {
        proxy_pass http://owui/_app/;
    }

    # ── Open WebUI API — /api/v1/ routed directly to OW ──────────────────
    # OW's compiled JS bundles set img.src="/api/v1/..." directly (bypassing
    # the fetch interceptor). Route these to OW and inject auth from the
    # ow_auth session cookie set by the injected script on iframe load.
    location /api/v1/ {
        proxy_pass http://owui/api/v1/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     "Bearer $cookie_ow_auth";
        proxy_buffering off;
    }

    # ── Agent log streaming — bypass Next.js (SSE needs unbuffered proxy) ─
    location ~ ^/api/teams/.+/agents/.+/logs/stream$ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     "Bearer $cookie_access_token";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # ── Clawborate API — routed through Next.js ─────────────────────────
    # Next.js middleware injects Authorization headers from httpOnly cookies,
    # then rewrites to the backend. Must not bypass this.
    location /api/ {
        proxy_pass http://nextjs/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Root redirect for OW navigation ─────────────────────────────────
    # OW uses location.href='/' (bypasses history.pushState interceptor).
    # When the Referer shows an OW-context URL, redirect back to /ow/.
    location = / {
        if ($ow_nav) {
            return 302 /ow/;
        }
        proxy_pass http://nextjs/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Next.js frontend (default) ───────────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
